<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type="text/javascript">
        numbering = function () {
            i = 0;
            while (i < 10) {
                document.write(i);
                i += 1;
            }
        }

        numbering();

        (function () {
            i = 0;
            while (i < 10) {
                document.write(i);
                i += 1;
            }
        })();   // 익명함수
    </script>
</body>
</html>
